<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>astro-consent test page</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    #log { background: #f5f5f5; padding: 1rem; margin-top: 1rem; font-family: monospace; font-size: 0.85rem; white-space: pre; }
  </style>

  <!-- Scripts that MUST NOT load before consent -->
  <script type="text/plain" data-consent="analytics" data-src="https://www.googletagmanager.com/gtag/js?id=G-TEST123"></script>
  <script type="text/plain" data-consent="analytics">
    window.__analyticsLoaded = true;
  </script>
  <script type="text/plain" data-consent="marketing">
    window.__marketingLoaded = true;
  </script>

  <!-- Inline mock: pretends to be GA to let us detect network requests -->
  <!-- Real network calls only happen when applyConsent activates data-src scripts -->
</head>
<body>
  <h1>astro-consent Runtime Test</h1>
  <div id="log">Waiting for consent runtime...</div>

  <!-- Import CSS so banner renders (minimal) -->
  <style>
    #astro-consent-banner { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ccc; padding: 1rem; display: flex; gap: 1rem; align-items: center; z-index: 9999; }
    #astro-consent-banner.cb-visible { display: flex; }
    .cb-modal { background: white; max-width: 500px; margin: 2rem auto; padding: 2rem; border-radius: 8px; }
    #astro-consent-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .cb-toggle { width: 44px; height: 24px; background: #ccc; border: none; border-radius: 12px; cursor: pointer; }
    .cb-toggle.active { background: #0070f3; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>

  <script src="../test-runtime.js"></script>

  <script>
    // Log state for Playwright to read
    function updateLog() {
      const s = window.astroConsent?.get();
      document.getElementById('log').textContent = JSON.stringify({
        consent: s,
        analyticsLoaded: !!window.__analyticsLoaded,
        marketingLoaded: !!window.__marketingLoaded,
        analyticsScriptActive: !!document.querySelector('script[data-consent="analytics"][data-consent-applied="true"]'),
        marketingScriptActive: !!document.querySelector('script[data-consent="marketing"][data-consent-applied="true"]'),
      }, null, 2);
    }
    setInterval(updateLog, 200);
    updateLog();
  </script>
</body>
</html>
